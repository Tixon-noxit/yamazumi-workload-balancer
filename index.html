<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/x-icon" href="law.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yamazumi Board — официальный отчет с Drag&Drop</title>

<style>
    * {
        box-sizing: border-box;
        font-family: "Segoe UI", "Arial", sans-serif;
    }

    body {
        margin: 0;
        background: #1a1a1a;
        color: #f0f0f0;
        padding: 24px;
    }

    /* Экранный стиль */
    .screen-only {
        display: block;
    }

    h1 {
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 16px;
        color: #ffffff;
        border-left: 8px solid #ffcc00;
        padding-left: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
    }

    .toolbar {
        display: flex;
        gap: 14px;
        background: #2a2a2a;
        padding: 12px 20px;
        border-radius: 40px;
        border: 2px solid #555;
    }

    .toolbar button {
        width: auto;
        padding: 8px 20px;
        background: #333;
        border: 2px solid #777;
        font-size: 13px;
    }

    .toolbar button:hover {
        background: #ffcc00;
        color: black;
        border-color: #ffcc00;
    }

    .layout {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 24px;
        margin-top: 16px;
    }

    .panel {
        background: #2a2a2a;
        border: 4px solid #555;
        padding: 20px;
        box-shadow: 8px 8px 0 #111;
    }

    .panel h2 {
        margin-top: 0;
        text-transform: uppercase;
        font-size: 18px;
        margin-bottom: 20px;
    }

    .field {
        margin-bottom: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #bbb;
    }

    input, select, button {
        width: 100%;
        padding: 12px;
        border: 3px solid #666;
        background: #111;
        color: white;
        font-size: 14px;
    }

    button {
        cursor: pointer;
        background: #ffcc00;
        color: black;
        font-weight: bold;
        transition: 0.15s;
    }

    button:hover {
        background: #ffe066;
        transform: translate(-2px, -2px);
    }

    .posts-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
        align-items: start;
    }

    .post-card {
        background: #242424;
        border: 4px solid #555;
        padding: 16px;
        transition: 0.1s;
    }

    .post-card.drag-over {
        border-color: #ffcc00;
        background: #2e2e2e;
        box-shadow: 0 0 0 2px #ffcc00;
    }

    .post-title {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 15px;
        text-transform: uppercase;
        font-weight: bold;
    }

    .progress-wrapper {
        height: 34px;
        background: #111;
        border: 3px solid #666;
        position: relative;
        margin-bottom: 12px;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        transition: 0.2s;
    }

    .progress-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 12px;
        font-weight: bold;
        color: white;
        text-shadow: 1px 1px 2px black;
        white-space: nowrap;
    }

    .operations {
        margin-top: 8px;
        font-size: 12px;
        color: #bbb;
        max-height: 400px;
        overflow-y: auto;
        border-top: 2px dashed #444;
        padding-top: 6px;
        min-height: 100px;
    }

    .operation-item {
        margin-bottom: 6px;
        padding: 6px 8px;
        background: #1e1e1e;
        border-left: 4px solid #ffcc00;
        cursor: grab;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        transition: 0.1s;
        position: relative;
    }

    .operation-item:active {
        cursor: grabbing;
    }

    .insert-indicator {
        height: 3px;
        background: #ffcc00;
        margin: 2px 0;
        border-radius: 2px;
        transition: 0.05s linear;
        box-shadow: 0 0 4px #ffcc00;
    }

    .operation-info {
        flex: 1;
        word-break: break-word;
    }

    .op-buttons {
        display: flex;
        gap: 6px;
    }

    .op-buttons button {
        width: auto;
        padding: 4px 8px;
        font-size: 11px;
        background: #333;
        border: 1px solid #777;
    }

    .op-buttons button.edit-op {
        background: #2c5f8a;
    }

    .op-buttons button.del-op {
        background: #8b3c2c;
    }

    .badge {
        background: #000;
        border: 2px solid #666;
        padding: 2px 8px;
        font-size: 11px;
    }

    .info-sec {
        font-size: 11px;
        color: #ffcc00;
        margin-top: 8px;
        text-align: center;
        background: #1f1f1f;
        padding: 4px;
        border-radius: 6px;
    }

    .chart-container {
        margin-top: 24px;
        background: #1f1f1f;
        border: 3px solid #444;
        padding: 16px;
    }

    .chart-title {
        font-size: 16px;
        margin-bottom: 12px;
        text-align: center;
    }

    .bar-chart {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        height: 180px;
        overflow-x: auto;
        padding-bottom: 8px;
    }

    .bar-wrapper {
        flex: 1;
        min-width: 50px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }

    .bar {
        width: 100%;
        background: #ffcc00;
        transition: height 0.2s;
        min-height: 4px;
        border-radius: 4px 4px 0 0;
    }

    .bar-label {
        font-size: 11px;
        text-align: center;
    }

    /* ========= ОФИЦИАЛЬНЫЙ МИНИМАЛИСТИЧНЫЙ СТИЛЬ ПЕЧАТИ ========= */
    @media print {
        /* Скрываем все элементы интерфейса */
        .toolbar, .panel, .chart-container, .op-buttons, 
        .insert-indicator, .progress-wrapper, .info-sec,
        button, .post-card .progress-wrapper {
            display: none !important;
        }

        body {
            background: white;
            padding: 0;
            margin: 0;
            color: black;
        }

        h1 {
            color: black;
            border-left: 4px solid #000;
            padding-left: 12px;
            font-size: 22px;
            margin-bottom: 20px;
            margin-top: 0;
        }

        h1::after {
            content: " • Отчет";
            font-size: 14px;
            font-weight: normal;
            color: #444;
        }

        .layout {
            display: block;
            margin-top: 0;
        }

        .posts-grid {
            display: block;
            gap: 0;
        }

        .post-card {
            background: white;
            border: 1px solid #ccc;
            padding: 12px;
            margin-bottom: 20px;
            break-inside: avoid;
            page-break-inside: avoid;
            box-shadow: none;
        }

        .post-title {
            font-size: 16px;
            font-weight: bold;
            color: #000;
            border-bottom: 2px solid #000;
            margin-bottom: 10px;
            padding-bottom: 6px;
        }

        .badge {
            border: 1px solid #aaa;
            background: #f5f5f5;
            color: #000;
        }

        .operations {
            border-top: 1px solid #ddd;
            padding-top: 8px;
            margin-top: 8px;
            max-height: none;
            overflow: visible;
        }

        .operation-item {
            background: #fafafa;
            border-left: 3px solid #333;
            margin-bottom: 6px;
            padding: 8px 6px;
            cursor: default;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .operation-info {
            color: #000;
            font-size: 11pt;
        }

        /* Таблица сводки — минималистичный официальный стиль */
        .print-summary {
            display: block;
            margin-top: 30px;
            border-top: 2px solid #000;
            padding-top: 15px;
        }

        .print-summary h3 {
            font-size: 16px;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11pt;
        }

        .summary-table th, .summary-table td {
            border: 1px solid #aaa;
            padding: 8px 6px;
            text-align: left;
            vertical-align: top;
        }

        .summary-table th {
            background: #f0f0f0;
            font-weight: bold;
        }

        .signatures {
            margin-top: 35px;
            display: flex;
            justify-content: space-between;
            font-size: 10pt;
            border-top: 1px dashed #aaa;
            padding-top: 20px;
        }

        .sign-line {
            width: 45%;
        }

        .sign-line p {
            margin: 5px 0;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 8pt;
            text-align: center;
            color: #555;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
    }
</style>
</head>
<body>

<h1>
     YAMAZUMI BOARD (секунды)
    <div class="toolbar">
        <button onclick="exportToExcel()"> EXCEL</button>
        <button onclick="printReport()"> ПЕЧАТЬ</button>
        <button onclick="resetAllData()"> СБРОС</button>
    </div>
</h1>

<div class="layout">
    <div class="panel">
        <h2>Добавить / редактировать</h2>
        <div class="field">
            <label> Название операции</label>
            <input type="text" id="operationName" placeholder="Например: Сварка">
        </div>
        <div class="field">
            <label> Время (секунды)</label>
            <input type="number" id="operationTime" placeholder="45" step="1" min="1">
        </div>
        <div class="field">
            <label> Пост</label>
            <select id="postSelect"></select>
        </div>
        <div class="field">
            <label> Лимит поста 100% (сек)</label>
            <input type="number" id="maxTime" value="28800">
            <div class="info-sec">⚡ 28800 сек = 8ч</div>
        </div>
        <button onclick="addOrUpdateOperation()"> ДОБАВИТЬ / СОХРАНИТЬ</button>
        <div class="info-sec" style="margin-top: 12px;">💡 Редактирование: нажмите ✏️ у операции</div>
        <div class="info-sec">🖱️ Drag&Drop: перетащите операцию МЕЖДУ постами при необходимости</div>
    </div>

    <div class="posts-grid" id="postsGrid"></div>
</div>

<div class="chart-container" id="chartContainer">
    <div class="chart-title"> Загрузка постов (%)</div>
    <div class="bar-chart" id="barChart"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
    // ------------------- ГЛОБАЛЬНОЕ СОСТОЯНИЕ ------------------
    let posts = [];
    const POSTS_COUNT = 10;
    let editingContext = null;
    let dragSource = null;
    let activeInsertPostId = null;
    let activeInsertIndex = -1;

    function loadFromLocalStorage() {
        const saved = localStorage.getItem("yamazumi_seconds_data");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.posts && parsed.maxTime) {
                    posts = parsed.posts;
                    document.getElementById("maxTime").value = parsed.maxTime;
                    return true;
                }
            } catch(e) { console.warn(e); }
        }
        posts = [];
        for (let i = 1; i <= POSTS_COUNT; i++) {
            posts.push({ id: i, operations: [], totalTime: 0 });
        }
        return false;
    }

    function saveToLocalStorage() {
        const maxTime = getMaxTime();
        localStorage.setItem("yamazumi_seconds_data", JSON.stringify({ posts, maxTime }));
    }

    function getMaxTime() {
        let val = Number(document.getElementById("maxTime").value);
        return (isNaN(val) || val <= 0) ? 28800 : val;
    }

    function formatTime(secondsTotal) {
        if (secondsTotal === 0) return "0 сек";
        const hrs = Math.floor(secondsTotal / 3600);
        const mins = Math.floor((secondsTotal % 3600) / 60);
        const secs = secondsTotal % 60;
        if (hrs > 0) return `${hrs}ч ${mins}мин ${secs}сек`;
        if (mins > 0) return `${mins}мин ${secs}сек`;
        return `${secs}сек`;
    }

    function getBarColor(percent) {
        if (percent < 90) return "#27c93f";
        if (percent < 100) return "#ffcc00";
        return "#ff3b30";
    }

    function recalcPostTotal(post) {
        post.totalTime = post.operations.reduce((sum, op) => sum + op.time, 0);
    }

    function refreshAllTotals() {
        posts.forEach(p => recalcPostTotal(p));
    }

    function moveOperationTo(sourcePostId, sourceOpIndex, targetPostId, targetInsertIndex) {
        const sourcePost = posts.find(p => p.id === sourcePostId);
        const targetPost = posts.find(p => p.id === targetPostId);
        if (!sourcePost || !targetPost) return false;
        if (sourceOpIndex < 0 || sourceOpIndex >= sourcePost.operations.length) return false;
        const [movedOp] = sourcePost.operations.splice(sourceOpIndex, 1);
        recalcPostTotal(sourcePost);
        if (targetInsertIndex < 0 || targetInsertIndex > targetPost.operations.length) targetPost.operations.push(movedOp);
        else targetPost.operations.splice(targetInsertIndex, 0, movedOp);
        recalcPostTotal(targetPost);
        return true;
    }

    function clearInsertIndicators() {
        document.querySelectorAll('.insert-indicator').forEach(el => el.remove());
        document.querySelectorAll('.post-card').forEach(card => card.classList.remove('drag-over'));
        activeInsertPostId = null;
        activeInsertIndex = -1;
    }

    function renderAll() {
        renderPosts();
        renderBarChart();
        saveToLocalStorage();
        clearInsertIndicators();
        dragSource = null;
    }

    function renderPosts() {
        const container = document.getElementById("postsGrid");
        container.innerHTML = "";
        const maxTime = getMaxTime();

        posts.forEach(post => {
            let percent = maxTime > 0 ? Math.min(100, Math.round((post.totalTime / maxTime) * 100)) : 0;
            const formattedTotal = formatTime(post.totalTime);
            const card = document.createElement("div");
            card.className = "post-card";
            card.setAttribute("data-post-id", post.id);

            card.addEventListener("dragover", (e) => {
                e.preventDefault();
                card.classList.add("drag-over");
            });
            card.addEventListener("dragleave", (e) => {
                if (!card.contains(e.relatedTarget)) card.classList.remove("drag-over");
            });
            card.addEventListener("drop", (e) => {
                e.preventDefault();
                card.classList.remove("drag-over");
                if (!dragSource) return;
                const targetPostId = post.id;
                if (dragSource.postId === targetPostId) return;
                const success = moveOperationTo(dragSource.postId, dragSource.opIndex, targetPostId, posts.find(p => p.id === targetPostId).operations.length);
                if (success) { refreshAllTotals(); renderAll(); }
                dragSource = null;
                clearInsertIndicators();
            });

            let operationsHtml = "";
            if (post.operations.length === 0) {
                operationsHtml = "<div style='padding: 6px; color:#888;'>Перетащите сюда или добавьте</div>";
            } else {
                operationsHtml = post.operations.map((op, idx) => `
                    <div class="operation-item" draggable="true" data-op-index="${idx}" data-post-id="${post.id}" data-op-name="${escapeHtml(op.name)}">
                        <div class="operation-info">
                            ${escapeHtml(op.name)} — ${op.time} сек (${formatTime(op.time)})
                        </div>
                        <div class="op-buttons">
                            <button class="edit-op" data-post="${post.id}" data-idx="${idx}" title="Изменить">✏️</button>
                            <button class="del-op" data-post="${post.id}" data-idx="${idx}" title="Удалить">🗑️</button>
                        </div>
                    </div>
                `).join("");
            }

            card.innerHTML = `
                <div class="post-title">
                    <span>ПОСТ ${post.id}</span>
                    <span class="badge">${formattedTotal}</span>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-bar" style="width:${percent}%; background:${getBarColor(percent)};"></div>
                    <div class="progress-text">${percent}% (${post.totalTime}/${maxTime} сек)</div>
                </div>
                <div class="operations" id="ops-list-${post.id}">${operationsHtml}</div>
            `;
            container.appendChild(card);

            // Drag & drop логика для операций (вклинивание)
            const opItems = card.querySelectorAll(".operation-item[draggable='true']");
            opItems.forEach(el => {
                el.addEventListener("dragstart", (e) => {
                    const opIdx = parseInt(el.getAttribute("data-op-index"));
                    const pId = parseInt(el.getAttribute("data-post-id"));
                    dragSource = { postId: pId, opIndex: opIdx };
                    e.dataTransfer.setData("text/plain", JSON.stringify({ sourcePostId: pId, opIndex: opIdx }));
                    e.dataTransfer.effectAllowed = "move";
                    e.target.style.opacity = "0.6";
                });
                el.addEventListener("dragend", (e) => {
                    e.target.style.opacity = "";
                    clearInsertIndicators();
                    dragSource = null;
                });
                el.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!dragSource) return;
                    const targetPostId = parseInt(el.getAttribute("data-post-id"));
                    const targetOpIndex = parseInt(el.getAttribute("data-op-index"));
                    const rect = el.getBoundingClientRect();
                    const mouseY = e.clientY;
                    const middle = rect.top + rect.height / 2;
                    let insertIndex = (mouseY > middle) ? targetOpIndex + 1 : targetOpIndex;
                    if (activeInsertPostId !== targetPostId || activeInsertIndex !== insertIndex) {
                        clearInsertIndicators();
                        activeInsertPostId = targetPostId;
                        activeInsertIndex = insertIndex;
                        const opsDiv = card.querySelector('.operations');
                        if (opsDiv) {
                            const children = Array.from(opsDiv.querySelectorAll('.operation-item'));
                            const indicator = document.createElement('div');
                            indicator.className = 'insert-indicator';
                            if (insertIndex === 0) opsDiv.insertBefore(indicator, children[0] || null);
                            else if (insertIndex >= children.length) opsDiv.appendChild(indicator);
                            else opsDiv.insertBefore(indicator, children[insertIndex]);
                        }
                    }
                });
                el.addEventListener("drop", (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!dragSource) return;
                    const targetPostId = parseInt(el.getAttribute("data-post-id"));
                    const targetOpIndex = parseInt(el.getAttribute("data-op-index"));
                    const rect = el.getBoundingClientRect();
                    const mouseY = e.clientY;
                    const middle = rect.top + rect.height / 2;
                    let insertIndex = (mouseY > middle) ? targetOpIndex + 1 : targetOpIndex;
                    const success = moveOperationTo(dragSource.postId, dragSource.opIndex, targetPostId, insertIndex);
                    if (success) { refreshAllTotals(); renderAll(); }
                    clearInsertIndicators();
                    dragSource = null;
                });
            });

            // Обработка дропа на пустую область операций
            const opsDiv = card.querySelector('.operations');
            if (opsDiv) {
                opsDiv.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    if (!dragSource) return;
                    if (post.operations.length === 0) {
                        if (activeInsertPostId !== post.id || activeInsertIndex !== 0) {
                            clearInsertIndicators();
                            activeInsertPostId = post.id;
                            activeInsertIndex = 0;
                            const indicator = document.createElement('div');
                            indicator.className = 'insert-indicator';
                            opsDiv.appendChild(indicator);
                        }
                    } else {
                        const lastOp = opsDiv.querySelector('.operation-item:last-child');
                        if (lastOp) {
                            const rectLast = lastOp.getBoundingClientRect();
                            if (e.clientY > rectLast.bottom) {
                                if (activeInsertPostId !== post.id || activeInsertIndex !== post.operations.length) {
                                    clearInsertIndicators();
                                    activeInsertPostId = post.id;
                                    activeInsertIndex = post.operations.length;
                                    const indicator = document.createElement('div');
                                    indicator.className = 'insert-indicator';
                                    opsDiv.appendChild(indicator);
                                }
                            }
                        }
                    }
                });
                opsDiv.addEventListener("drop", (e) => {
                    e.preventDefault();
                    if (!dragSource) return;
                    let insertIndex = (activeInsertPostId === post.id && activeInsertIndex !== -1) ? activeInsertIndex : post.operations.length;
                    const success = moveOperationTo(dragSource.postId, dragSource.opIndex, post.id, insertIndex);
                    if (success) { refreshAllTotals(); renderAll(); }
                    clearInsertIndicators();
                    dragSource = null;
                });
            }

            // Кнопки редактирования/удаления
            card.querySelectorAll(".edit-op").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const postId = Number(btn.getAttribute("data-post"));
                    const idx = Number(btn.getAttribute("data-idx"));
                    const post = posts.find(p => p.id === postId);
                    if (post && post.operations[idx]) {
                        const op = post.operations[idx];
                        document.getElementById("operationName").value = op.name;
                        document.getElementById("operationTime").value = op.time;
                        document.getElementById("postSelect").value = postId;
                        editingContext = { postId, opIndex: idx };
                        alert(`Редактирование: "${op.name}" → измените данные и нажмите кнопку.`);
                    }
                });
            });
            card.querySelectorAll(".del-op").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const postId = Number(btn.getAttribute("data-post"));
                    const idx = Number(btn.getAttribute("data-idx"));
                    const post = posts.find(p => p.id === postId);
                    if (post && post.operations[idx] && confirm(`Удалить операцию "${post.operations[idx].name}"?`)) {
                        post.operations.splice(idx, 1);
                        recalcPostTotal(post);
                        renderAll();
                    }
                });
            });
        });
    }

    function renderBarChart() {
        const maxTime = getMaxTime();
        const chartDiv = document.getElementById("barChart");
        chartDiv.innerHTML = "";
        posts.forEach(post => {
            let percent = maxTime > 0 ? (post.totalTime / maxTime) * 100 : 0;
            percent = Math.min(100, percent);
            const wrapper = document.createElement("div");
            wrapper.className = "bar-wrapper";
            const bar = document.createElement("div");
            bar.className = "bar";
            bar.style.height = `${Math.max(4, percent)}px`;
            bar.style.backgroundColor = getBarColor(percent);
            const label = document.createElement("div");
            label.className = "bar-label";
            label.innerText = `П${post.id}\n${Math.round(percent)}%`;
            wrapper.appendChild(bar);
            wrapper.appendChild(label);
            chartDiv.appendChild(wrapper);
        });
    }

    function addOrUpdateOperation() {
        let name = document.getElementById("operationName").value.trim();
        let timeSec = Number(document.getElementById("operationTime").value);
        let postId = Number(document.getElementById("postSelect").value);
        if (!name) { alert("Введите название операции"); return; }
        if (isNaN(timeSec) || timeSec <= 0) { alert("Введите корректное время (сек)"); return; }
        timeSec = Math.floor(timeSec);
        const targetPost = posts.find(p => p.id === postId);
        if (!targetPost) return;
        if (editingContext !== null) {
            const oldPost = posts.find(p => p.id === editingContext.postId);
            if (oldPost && oldPost.operations[editingContext.opIndex]) {
                oldPost.operations.splice(editingContext.opIndex, 1);
                recalcPostTotal(oldPost);
                targetPost.operations.push({ name, time: timeSec });
                recalcPostTotal(targetPost);
                editingContext = null;
                clearForm();
                renderAll();
                return;
            }
        }
        targetPost.operations.push({ name, time: timeSec });
        recalcPostTotal(targetPost);
        clearForm();
        renderAll();
    }

    function clearForm() {
        document.getElementById("operationName").value = "";
        document.getElementById("operationTime").value = "";
        editingContext = null;
    }

    function resetAllData() {
        if (confirm("❗ ВСЕ операции будут удалены. Продолжить?")) {
            posts.forEach(p => { p.operations = []; p.totalTime = 0; });
            editingContext = null;
            clearForm();
            renderAll();
        }
    }

    // Официальная печать с минималистичным шаблоном
    function printReport() {
        const originalTitle = document.title;
        document.title = "Yamazumi Board";
        
        // Создаем контейнер для печатной сводки (будет добавлен временно)
        const printContainer = document.createElement('div');
        printContainer.className = 'print-summary';
        const maxTime = getMaxTime();
        const currentDate = new Date().toLocaleString('ru-RU');
        
        let summaryHTML = `<h3>Сводка по загрузке постов</h3>
        <table class="summary-table">
            <thead>
                <tr><th>Пост</th><th>Суммарное время</th><th>Лимит (сек)</th><th>Загрузка (%)</th><th>Кол-во операций</th></tr>
            </thead>
            <tbody>`;
        posts.forEach(post => {
            const percent = maxTime > 0 ? Math.round((post.totalTime / maxTime) * 100) : 0;
            summaryHTML += `<tr>
                <td><strong>Пост ${post.id}</strong></td>
                <td>${formatTime(post.totalTime)} (${post.totalTime} сек)</td>
                <td>${formatTime(maxTime)} (${maxTime} сек)</td>
                <td>${percent}%</td>
                <td>${post.operations.length}</td>
            </tr>`;
        });
        const totalAllTime = posts.reduce((sum, p) => sum + p.totalTime, 0);
        const avgLoad = posts.length ? Math.round((totalAllTime / (posts.length * maxTime)) * 100) : 0;
        summaryHTML += `<tr style="background:#f5f5f5;"><td><strong>ИТОГО / СРЕДНЕЕ</strong></td>
            <td><strong>${formatTime(totalAllTime)}</strong></td>
            <td>—</td>
            <td><strong>${avgLoad}%</strong></td>
            <td>${posts.reduce((sum,p) => sum + p.operations.length, 0)}</td>
        </tr>`;
        summaryHTML += `</tbody></table>
        <div class="signatures">
            <div class="sign-line">
                <p>Руководитель участка: ___________________</p>
                <p style="font-size:9px;">(Ф.И.О., подпись)</p>
            </div>
            <div class="sign-line">
                <p>Инженер по организации труда: ___________________</p>
                <p style="font-size:9px;">(Ф.И.О., подпись)</p>
            </div>
        </div>
        <div class="footer-note">
            Отчет сформирован: ${currentDate} | Система Yamazumi Board<br>
        </div>`;
        
        printContainer.innerHTML = summaryHTML;
        document.body.appendChild(printContainer);
        
        window.print();
        
        // Удаляем временный контейнер после печати
        document.body.removeChild(printContainer);
        document.title = originalTitle;
    }

    function exportToExcel() {
        const maxTime = getMaxTime();
        const rows = [];
        posts.forEach(post => {
            const percent = maxTime > 0 ? Math.round((post.totalTime / maxTime) * 100) : 0;
            const totalFmt = formatTime(post.totalTime);
            const maxFmt = formatTime(maxTime);
            if (post.operations.length === 0) {
                rows.push({ "Пост": `Пост ${post.id}`, "Операция": "(нет операций)", "Время (сек)": 0, "Время (формат)": "0 сек", "Суммарно (сек)": post.totalTime, "Суммарно (формат)": totalFmt, "Лимит (сек)": maxTime, "Лимит (формат)": maxFmt, "Загрузка %": `${percent}%` });
            } else {
                post.operations.forEach(op => {
                    rows.push({ "Пост": `Пост ${post.id}`, "Операция": op.name, "Время (сек)": op.time, "Время (формат)": formatTime(op.time), "Суммарно (сек)": post.totalTime, "Суммарно (формат)": totalFmt, "Лимит (сек)": maxTime, "Лимит (формат)": maxFmt, "Загрузка %": `${percent}%` });
                });
            }
            rows.push({ "Пост": `--- ИТОГ ПОСТА ${post.id} ---`, "Операция": "", "Время (сек)": "", "Время (формат)": "", "Суммарно (сек)": post.totalTime, "Суммарно (формат)": totalFmt, "Лимит (сек)": maxTime, "Лимит (формат)": maxFmt, "Загрузка %": `${percent}%` });
        });
        const totalAll = posts.reduce((s,p) => s + p.totalTime, 0);
        rows.push({ "Пост": "ОБЩАЯ СВОДКА", "Операция": "Сумма всех постов", "Время (сек)": totalAll, "Время (формат)": formatTime(totalAll), "Суммарно (сек)": "", "Суммарно (формат)": "", "Лимит (сек)": "", "Лимит (формат)": "", "Загрузка %": "" });
        const ws = XLSX.utils.json_to_sheet(rows);
        ws["!cols"] = [{wch:14},{wch:30},{wch:14},{wch:22},{wch:16},{wch:20},{wch:14},{wch:20},{wch:12}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Yamazumi");
        XLSX.writeFile(wb, `Yamazumi_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
    }

    function initPostSelect() {
        const select = document.getElementById("postSelect");
        select.innerHTML = "";
        for (let i = 1; i <= POSTS_COUNT; i++) {
            select.appendChild(new Option(`Пост ${i}`, i));
        }
    }

    document.getElementById("maxTime").addEventListener("input", () => renderAll());
    window.addEventListener("load", () => {
        initPostSelect();
        loadFromLocalStorage();
        refreshAllTotals();
        renderAll();
    });
</script>
</body>
