<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<link rel="icon" type="image/x-icon" href="law.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yamazumi Board — Drag&Drop c вклиниванием операций</title>

<style>
    * {
        box-sizing: border-box;
        font-family: "Arial Black", "Segoe UI", sans-serif;
    }

    body {
        margin: 0;
        background: #1a1a1a;
        color: #f0f0f0;
        padding: 24px;
    }

    h1 {
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 16px;
        color: #ffffff;
        border-left: 8px solid #ffcc00;
        padding-left: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 16px;
    }

    .toolbar {
        display: flex;
        gap: 14px;
        background: #2a2a2a;
        padding: 12px 20px;
        border-radius: 40px;
        border: 2px solid #555;
    }

    .toolbar button {
        width: auto;
        padding: 8px 20px;
        background: #333;
        border: 2px solid #777;
        font-size: 13px;
    }

    .toolbar button:hover {
        background: #ffcc00;
        color: black;
        border-color: #ffcc00;
    }

    .layout {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 24px;
        margin-top: 16px;
    }

    .panel {
        background: #2a2a2a;
        border: 4px solid #555;
        padding: 20px;
        box-shadow: 8px 8px 0 #111;
    }

    .panel h2 {
        margin-top: 0;
        text-transform: uppercase;
        font-size: 18px;
        margin-bottom: 20px;
    }

    .field {
        margin-bottom: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #bbb;
    }

    input, select, button {
        width: 100%;
        padding: 12px;
        border: 3px solid #666;
        background: #111;
        color: white;
        font-size: 14px;
    }

    button {
        cursor: pointer;
        background: #ffcc00;
        color: black;
        font-weight: bold;
        transition: 0.15s;
    }

    button:hover {
        background: #ffe066;
        transform: translate(-2px, -2px);
    }

    .posts-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px;
        align-items: start;
    }

    .post-card {
        background: #242424;
        border: 4px solid #555;
        padding: 16px;
        transition: 0.1s;
    }

    .post-card.drag-over {
        border-color: #ffcc00;
        background: #2e2e2e;
        box-shadow: 0 0 0 2px #ffcc00;
    }

    .post-title {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 15px;
        text-transform: uppercase;
    }

    .progress-wrapper {
        height: 34px;
        background: #111;
        border: 3px solid #666;
        position: relative;
        margin-bottom: 12px;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        transition: 0.2s;
    }

    .progress-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 12px;
        font-weight: bold;
        color: white;
        text-shadow: 1px 1px 2px black;
        white-space: nowrap;
    }

    .operations {
        margin-top: 8px;
        font-size: 12px;
        color: #bbb;
        max-height: 400px;
        overflow-y: auto;
        border-top: 2px dashed #444;
        padding-top: 6px;
        min-height: 100px;
    }

    /* Стили для элементов операций — теперь поддерживают индикатор вставки */
    .operation-item {
        margin-bottom: 6px;
        padding: 6px 8px;
        background: #1e1e1e;
        border-left: 4px solid #ffcc00;
        cursor: grab;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        transition: 0.1s;
        position: relative;
    }

    .operation-item:active {
        cursor: grabbing;
    }

    /* Индикатор места вставки (горизонтальная линия) */
    .insert-indicator {
        height: 3px;
        background: #ffcc00;
        margin: 2px 0;
        border-radius: 2px;
        transition: 0.05s linear;
        box-shadow: 0 0 4px #ffcc00;
    }

    .operation-info {
        flex: 1;
        word-break: break-word;
    }

    .op-buttons {
        display: flex;
        gap: 6px;
    }

    .op-buttons button {
        width: auto;
        padding: 4px 8px;
        font-size: 11px;
        background: #333;
        border: 1px solid #777;
    }

    .op-buttons button.edit-op {
        background: #2c5f8a;
    }

    .op-buttons button.del-op {
        background: #8b3c2c;
    }

    .badge {
        background: #000;
        border: 2px solid #666;
        padding: 2px 8px;
        font-size: 11px;
    }

    .info-sec {
        font-size: 11px;
        color: #ffcc00;
        margin-top: 8px;
        text-align: center;
        background: #1f1f1f;
        padding: 4px;
        border-radius: 6px;
    }

    /* График */
    .chart-container {
        margin-top: 24px;
        background: #1f1f1f;
        border: 3px solid #444;
        padding: 16px;
    }

    .chart-title {
        font-size: 16px;
        margin-bottom: 12px;
        text-align: center;
    }

    .bar-chart {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        height: 180px;
        overflow-x: auto;
        padding-bottom: 8px;
    }

    .bar-wrapper {
        flex: 1;
        min-width: 50px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
    }

    .bar {
        width: 100%;
        background: #ffcc00;
        transition: height 0.2s;
        min-height: 4px;
        border-radius: 4px 4px 0 0;
    }

    .bar-label {
        font-size: 11px;
        text-align: center;
    }

    @media print {
        body {
            background: white;
            color: black;
            padding: 10px;
        }
        .panel, .toolbar, .op-buttons button, .chart-container .bar {
            display: none;
        }
        .posts-grid {
            grid-template-columns: 1fr 1fr;
        }
        .post-card {
            break-inside: avoid;
            border: 2px solid black;
            background: white;
            color: black;
        }
        .progress-bar {
            background: #ccc !important;
        }
        .operations {
            color: black;
        }
        .badge, .info-sec {
            color: black;
        }
    }
</style>
</head>
<body>

<h1>
     YAMAZUMI BOARD (секунды) — вклинивание перетаскиванием
    <div class="toolbar">
        <button onclick="exportToExcel()"> EXCEL</button>
        <button onclick="printReport()"> ПЕЧАТЬ</button>
        <button onclick="resetAllData()"> СБРОС</button>
    </div>
</h1>

<div class="layout">
    <div class="panel">
        <h2>➕ Добавить / редактировать</h2>
        <div class="field">
            <label> Название операции</label>
            <input type="text" id="operationName" placeholder="Например: Сварка">
        </div>
        <div class="field">
            <label> Время (секунды)</label>
            <input type="number" id="operationTime" placeholder="45" step="1" min="1">
        </div>
        <div class="field">
            <label> Пост</label>
            <select id="postSelect"></select>
        </div>
        <div class="field">
            <label> Лимит поста 100% (сек)</label>
            <input type="number" id="maxTime" value="28800">
            <div class="info-sec">⚡ 28800 сек = 8ч</div>
        </div>
        <button onclick="addOrUpdateOperation()"> ДОБАВИТЬ / СОХРАНИТЬ</button>
        <div class="info-sec" style="margin-top: 12px;">💡 Редактирование: нажмите ✏️ у операции</div>
        <div class="info-sec">🖱️ Drag&Drop: перетащите операцию МЕЖДУ операциями для вклинивания</div>
        <div class="info-sec">📌 При перетаскивании на пустую область поста — добавится в конец</div>
    </div>

    <div class="posts-grid" id="postsGrid"></div>
</div>

<div class="chart-container" id="chartContainer">
    <div class="chart-title"> Загрузка постов (%)</div>
    <div class="bar-chart" id="barChart"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
    // ------------------- ГЛОБАЛЬНОЕ СОСТОЯНИЕ ------------------
    let posts = [];
    const POSTS_COUNT = 10;
    let editingContext = null; // { postId, opIndex }
    
    // ---- Для drag & drop с вклиниванием ----
    let dragSource = null;      // { postId, opIndex }
    let currentDropTarget = null; // { postId, insertIndex } — куда вставим (insertIndex = позиция, перед которой вставлять)
    let activeInsertPostId = null;
    let activeInsertIndex = -1;

    // Инициализация или загрузка из localStorage
    function loadFromLocalStorage() {
        const saved = localStorage.getItem("yamazumi_seconds_data");
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                if (parsed.posts && parsed.maxTime) {
                    posts = parsed.posts;
                    document.getElementById("maxTime").value = parsed.maxTime;
                    return true;
                }
            } catch(e) { console.warn(e); }
        }
        // создаём посты по умолчанию
        posts = [];
        for (let i = 1; i <= POSTS_COUNT; i++) {
            posts.push({
                id: i,
                operations: [],
                totalTime: 0
            });
        }
        return false;
    }

    function saveToLocalStorage() {
        const maxTime = getMaxTime();
        const data = {
            posts: posts,
            maxTime: maxTime
        };
        localStorage.setItem("yamazumi_seconds_data", JSON.stringify(data));
    }

    function getMaxTime() {
        let val = Number(document.getElementById("maxTime").value);
        if (isNaN(val) || val <= 0) return 28800;
        return val;
    }

    function formatTime(secondsTotal) {
        if (secondsTotal === 0) return "0 сек";
        const hrs = Math.floor(secondsTotal / 3600);
        const mins = Math.floor((secondsTotal % 3600) / 60);
        const secs = secondsTotal % 60;
        if (hrs > 0) return `${hrs}ч ${mins}мин ${secs}сек`;
        if (mins > 0) return `${mins}мин ${secs}сек`;
        return `${secs}сек`;
    }

    function getBarColor(percent) {
        if (percent < 90) return "#27c93f";
        if (percent < 100) return "#ffcc00";
        return "#ff3b30";
    }

    function recalcPostTotal(post) {
        let sum = 0;
        for (let op of post.operations) sum += op.time;
        post.totalTime = sum;
    }

    function refreshAllTotals() {
        for (let p of posts) recalcPostTotal(p);
    }

    // Функция перемещения операции с указанием точной позиции вставки (insertIndex — индекс, перед которым вставлять)
    function moveOperationTo(sourcePostId, sourceOpIndex, targetPostId, targetInsertIndex) {
        if (sourcePostId === targetPostId && sourceOpIndex === targetInsertIndex) return false;
        if (sourcePostId === targetPostId && targetInsertIndex === sourceOpIndex + 1) return false; // нет смысла
        
        const sourcePost = posts.find(p => p.id === sourcePostId);
        const targetPost = posts.find(p => p.id === targetPostId);
        if (!sourcePost || !targetPost) return false;
        if (sourceOpIndex < 0 || sourceOpIndex >= sourcePost.operations.length) return false;
        
        // Извлекаем операцию из исходного поста
        const [movedOp] = sourcePost.operations.splice(sourceOpIndex, 1);
        recalcPostTotal(sourcePost);
        
        // Вставляем в целевой пост на позицию targetInsertIndex
        if (targetInsertIndex < 0 || targetInsertIndex > targetPost.operations.length) {
            targetPost.operations.push(movedOp);
        } else {
            targetPost.operations.splice(targetInsertIndex, 0, movedOp);
        }
        recalcPostTotal(targetPost);
        return true;
    }

    // ---- Очистка визуальных индикаторов вставки ----
    function clearInsertIndicators() {
        document.querySelectorAll('.insert-indicator').forEach(el => el.remove());
        // Убираем подсветку дроп-зоны у карточек
        document.querySelectorAll('.post-card').forEach(card => {
            card.classList.remove('drag-over');
        });
        activeInsertPostId = null;
        activeInsertIndex = -1;
    }

    // ---- Рендер всех карточек с возможностью детекции вставки (HTML + повторная инициализация) ----
    function renderAll() {
        renderPosts();
        renderBarChart();
        saveToLocalStorage();
        // Сбрасываем контекст перетаскивания после рендера, чтобы не было артефактов
        clearInsertIndicators();
        dragSource = null;
        currentDropTarget = null;
    }

    function renderPosts() {
        const container = document.getElementById("postsGrid");
        container.innerHTML = "";
        const maxTime = getMaxTime();

        posts.forEach(post => {
            let percent = maxTime > 0 ? Math.min(100, Math.round((post.totalTime / maxTime) * 100)) : 0;
            const formattedTotal = formatTime(post.totalTime);
            const card = document.createElement("div");
            card.className = "post-card";
            card.setAttribute("data-post-id", post.id);
            card.setAttribute("draggable", "false");
            
            // Обработчики для дропа на сам пост (когда бросаем на пустое место карточки, но не на операцию)
            card.addEventListener("dragover", (e) => {
                e.preventDefault();
                // Если нет активного индикатора от операции, то подсвечиваем карточку (визуально)
                card.classList.add("drag-over");
            });
            card.addEventListener("dragleave", (e) => {
                if (!card.contains(e.relatedTarget)) {
                    card.classList.remove("drag-over");
                }
            });
            card.addEventListener("drop", (e) => {
                e.preventDefault();
                card.classList.remove("drag-over");
                // Если нет данных перетаскивания или нет dragSource - выходим
                if (!dragSource) return;
                // Бросаем на пустую область поста (без привязки к конкретной операции)
                // Значит вставляем в конец списка операций
                const targetPostId = post.id;
                if (dragSource.postId === targetPostId) return;
                const success = moveOperationTo(dragSource.postId, dragSource.opIndex, targetPostId, posts.find(p => p.id === targetPostId).operations.length);
                if (success) {
                    refreshAllTotals();
                    renderAll();
                }
                dragSource = null;
                clearInsertIndicators();
            });
            
            // Создаем блок операций
            let operationsHtml = "";
            if (post.operations.length === 0) {
                operationsHtml = "<div style='padding: 6px; color:#888;'>📭 Перетащите сюда или добавьте</div>";
            } else {
                // Каждая операция будет рендериться с data-атрибутами, плюс добавим индикаторы между ними (но их визуал будет добавляться отдельно при dragover)
                operationsHtml = post.operations.map((op, idx) => {
                    const readable = formatTime(op.time);
                    return `
                        <div class="operation-item" draggable="true" data-op-index="${idx}" data-post-id="${post.id}" data-op-name="${escapeHtml(op.name)}">
                            <div class="operation-info">
                                🔹 ${escapeHtml(op.name)} — ${op.time} сек (${readable})
                            </div>
                            <div class="op-buttons">
                                <button class="edit-op" data-post="${post.id}" data-idx="${idx}">✏️</button>
                                <button class="del-op" data-post="${post.id}" data-idx="${idx}">🗑️</button>
                            </div>
                        </div>
                    `;
                }).join("");
            }
            
            card.innerHTML = `
                <div class="post-title">
                    <span>⚙️ ПОСТ ${post.id}</span>
                    <span class="badge">${formattedTotal}</span>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-bar" style="width:${percent}%; background:${getBarColor(percent)};"></div>
                    <div class="progress-text">${percent}% (${post.totalTime}/${maxTime} сек)</div>
                </div>
                <div class="operations" id="ops-list-${post.id}">
                    ${operationsHtml}
                </div>
            `;
            
            container.appendChild(card);
            
            // Навешиваем обработчики перетаскивания для операций (draggable)
            const opsContainer = card.querySelector('.operations');
            const opItems = card.querySelectorAll(".operation-item[draggable='true']");
            opItems.forEach(el => {
                el.addEventListener("dragstart", (e) => {
                    const opIdx = parseInt(el.getAttribute("data-op-index"));
                    const pId = parseInt(el.getAttribute("data-post-id"));
                    dragSource = { postId: pId, opIndex: opIdx };
                    e.dataTransfer.setData("text/plain", JSON.stringify({ sourcePostId: pId, opIndex: opIdx }));
                    e.dataTransfer.effectAllowed = "move";
                    // Стиль при перетаскивании
                    e.target.style.opacity = "0.6";
                });
                el.addEventListener("dragend", (e) => {
                    e.target.style.opacity = "";
                    clearInsertIndicators();
                    dragSource = null;
                    currentDropTarget = null;
                });
                
                // Обработчики для dragover/drop на каждую операцию - чтобы вклинивать ПЕРЕД/ПОСЛЕ
                el.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!dragSource) return;
                    
                    const targetPostId = parseInt(el.getAttribute("data-post-id"));
                    const targetOpIndex = parseInt(el.getAttribute("data-op-index"));
                    const targetPost = posts.find(p => p.id === targetPostId);
                    if (!targetPost) return;
                    
                    // Определяем позицию вставки: перед этой операцией? Или после неё, в зависимости от координат Y?
                    // Чтобы было удобно: если курсор в верхней половине элемента - вставляем перед, в нижней - после.
                    const rect = el.getBoundingClientRect();
                    const mouseY = e.clientY;
                    const middle = rect.top + rect.height / 2;
                    let insertIndex = targetOpIndex;
                    if (mouseY > middle) {
                        insertIndex = targetOpIndex + 1; // вставляем после текущей операции
                    } else {
                        insertIndex = targetOpIndex;   // вставляем перед текущей операцией
                    }
                    
                    // Обновляем активный индикатор (отрисовка линии вставки)
                    if (activeInsertPostId !== targetPostId || activeInsertIndex !== insertIndex) {
                        clearInsertIndicators();
                        activeInsertPostId = targetPostId;
                        activeInsertIndex = insertIndex;
                        // Рисуем линию в нужном месте внутри контейнера .operations
                        const opsDiv = card.querySelector('.operations');
                        if (opsDiv) {
                            // Находим все .operation-item внутри, чтобы вставить индикатор
                            const children = Array.from(opsDiv.querySelectorAll('.operation-item'));
                            let indicator = document.createElement('div');
                            indicator.className = 'insert-indicator';
                            if (insertIndex === 0) {
                                // Вставляем в начало
                                opsDiv.insertBefore(indicator, children[0] || null);
                            } else if (insertIndex >= children.length) {
                                // Вставляем в конец
                                opsDiv.appendChild(indicator);
                            } else {
                                // Вставляем перед элементом с индексом insertIndex
                                opsDiv.insertBefore(indicator, children[insertIndex]);
                            }
                        }
                    }
                });
                
                el.addEventListener("dragleave", (e) => {
                    // Не сбрасываем сразу, чтобы не моргало, но если покинули всю зону, сбросим позже через dragend
                });
                
                el.addEventListener("drop", (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!dragSource) return;
                    
                    // Определяем точный индекс вставки (insertIndex), который был сохранён в activeInsertIndex
                    let targetPostId = parseInt(el.getAttribute("data-post-id"));
                    let targetOpIndex = parseInt(el.getAttribute("data-op-index"));
                    const rect = el.getBoundingClientRect();
                    const mouseY = e.clientY;
                    const middle = rect.top + rect.height / 2;
                    let insertIndex = (mouseY > middle) ? targetOpIndex + 1 : targetOpIndex;
                    
                    // Дополнительная валидация: не пытаемся переместить в то же самое место
                    if (dragSource.postId === targetPostId && dragSource.opIndex === insertIndex) {
                        clearInsertIndicators();
                        dragSource = null;
                        return;
                    }
                    if (dragSource.postId === targetPostId && insertIndex === dragSource.opIndex + 1 && dragSource.opIndex === targetOpIndex && mouseY > middle) {
                        clearInsertIndicators();
                        dragSource = null;
                        return;
                    }
                    
                    const success = moveOperationTo(dragSource.postId, dragSource.opIndex, targetPostId, insertIndex);
                    if (success) {
                        refreshAllTotals();
                        renderAll();
                    } else {
                        // Если перемещение не удалось, просто перерисовываем
                        renderAll();
                    }
                    clearInsertIndicators();
                    dragSource = null;
                });
            });
            
            // Обработчик для области .operations (фон) — чтобы можно было бросить операцию в пустую область, но уже обработано на карточке.
            // Дополнительно для гарантии, если бросили между операциями точно отработает через drop на операции, но пустая зона уже есть у card.
            // Однако нужно чтобы операции не перехватывали весь дроп, но drop на них уже есть.
            // Дополнительно вешаем на контейнер операций обработчик dragover для показа вставки в конце, если нет операций
            const opsDiv = card.querySelector('.operations');
            if (opsDiv) {
                opsDiv.addEventListener("dragover", (e) => {
                    e.preventDefault();
                    if (!dragSource) return;
                    // Если операций нет, показываем индикатор вставки в контейнере (пустой список)
                    if (post.operations.length === 0) {
                        if (activeInsertPostId !== post.id || activeInsertIndex !== 0) {
                            clearInsertIndicators();
                            activeInsertPostId = post.id;
                            activeInsertIndex = 0;
                            let indicator = document.createElement('div');
                            indicator.className = 'insert-indicator';
                            opsDiv.appendChild(indicator);
                        }
                        opsDiv.classList.add('drag-over');
                    } else {
                        // Если есть операции, но мы навели на свободное место после последней операции
                        // Узнаём, есть ли уже индикатор в конце? определим по мыши
                        const lastOp = opsDiv.querySelector('.operation-item:last-child');
                        if (lastOp) {
                            const rectLast = lastOp.getBoundingClientRect();
                            if (e.clientY > rectLast.bottom) {
                                if (activeInsertPostId !== post.id || activeInsertIndex !== post.operations.length) {
                                    clearInsertIndicators();
                                    activeInsertPostId = post.id;
                                    activeInsertIndex = post.operations.length;
                                    let indicator = document.createElement('div');
                                    indicator.className = 'insert-indicator';
                                    opsDiv.appendChild(indicator);
                                }
                            }
                        }
                    }
                });
                opsDiv.addEventListener("dragleave", (e) => {
                    if (!opsDiv.contains(e.relatedTarget)) {
                        if (!dragSource) clearInsertIndicators();
                    }
                });
                opsDiv.addEventListener("drop", (e) => {
                    e.preventDefault();
                    if (!dragSource) return;
                    let targetPostId = post.id;
                    let insertIndex = activeInsertIndex !== -1 && activeInsertPostId === targetPostId ? activeInsertIndex : post.operations.length;
                    if (insertIndex < 0) insertIndex = post.operations.length;
                    
                    const success = moveOperationTo(dragSource.postId, dragSource.opIndex, targetPostId, insertIndex);
                    if (success) {
                        refreshAllTotals();
                        renderAll();
                    } else {
                        renderAll();
                    }
                    clearInsertIndicators();
                    dragSource = null;
                });
            }
            
            // Кнопки редактирования и удаления
            card.querySelectorAll(".edit-op").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const postId = Number(btn.getAttribute("data-post"));
                    const idx = Number(btn.getAttribute("data-idx"));
                    const post = posts.find(p => p.id === postId);
                    if (post && post.operations[idx]) {
                        const op = post.operations[idx];
                        document.getElementById("operationName").value = op.name;
                        document.getElementById("operationTime").value = op.time;
                        document.getElementById("postSelect").value = postId;
                        editingContext = { postId, opIndex: idx };
                        alert(`Редактирование: "${op.name}" → измените данные и нажмите "ДОБАВИТЬ / СОХРАНИТЬ".`);
                    }
                });
            });
            
            card.querySelectorAll(".del-op").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    e.stopPropagation();
                    const postId = Number(btn.getAttribute("data-post"));
                    const idx = Number(btn.getAttribute("data-idx"));
                    const post = posts.find(p => p.id === postId);
                    if (post && post.operations[idx]) {
                        if (confirm(`Удалить операцию "${post.operations[idx].name}"?`)) {
                            post.operations.splice(idx, 1);
                            recalcPostTotal(post);
                            renderAll();
                        }
                    }
                });
            });
        });
    }
    
    function renderBarChart() {
        const maxTime = getMaxTime();
        const chartDiv = document.getElementById("barChart");
        chartDiv.innerHTML = "";
        posts.forEach(post => {
            let percent = maxTime > 0 ? (post.totalTime / maxTime) * 100 : 0;
            percent = Math.min(100, percent);
            const wrapper = document.createElement("div");
            wrapper.className = "bar-wrapper";
            const bar = document.createElement("div");
            bar.className = "bar";
            bar.style.height = `${Math.max(4, percent)}px`;
            bar.style.backgroundColor = getBarColor(percent);
            const label = document.createElement("div");
            label.className = "bar-label";
            label.innerText = `П${post.id}\n${Math.round(percent)}%`;
            wrapper.appendChild(bar);
            wrapper.appendChild(label);
            chartDiv.appendChild(wrapper);
        });
    }
    
    function addOrUpdateOperation() {
        let name = document.getElementById("operationName").value.trim();
        let timeSec = Number(document.getElementById("operationTime").value);
        let postId = Number(document.getElementById("postSelect").value);
        if (!name) { alert("Введите название операции"); return; }
        if (isNaN(timeSec) || timeSec <= 0) { alert("Введите корректное время (секунды >0)"); return; }
        timeSec = Math.floor(timeSec);
        const targetPost = posts.find(p => p.id === postId);
        if (!targetPost) return;
        
        if (editingContext !== null) {
            const oldPost = posts.find(p => p.id === editingContext.postId);
            if (oldPost && oldPost.operations[editingContext.opIndex]) {
                oldPost.operations.splice(editingContext.opIndex, 1);
                recalcPostTotal(oldPost);
                targetPost.operations.push({ name, time: timeSec });
                recalcPostTotal(targetPost);
                editingContext = null;
                clearForm();
                renderAll();
                return;
            }
        }
        targetPost.operations.push({ name, time: timeSec });
        recalcPostTotal(targetPost);
        clearForm();
        renderAll();
    }
    
    function clearForm() {
        document.getElementById("operationName").value = "";
        document.getElementById("operationTime").value = "";
        editingContext = null;
    }
    
    function resetAllData() {
        if (confirm("❗ ВСЕ операции будут удалены. Продолжить?")) {
            for (let i = 0; i < posts.length; i++) {
                posts[i].operations = [];
                posts[i].totalTime = 0;
            }
            editingContext = null;
            clearForm();
            renderAll();
        }
    }
    
    function printReport() { window.print(); }
    
    function exportToExcel() {
        const maxTime = getMaxTime();
        const rows = [];
        posts.forEach(post => {
            const percent = maxTime > 0 ? Math.round((post.totalTime / maxTime) * 100) : 0;
            const totalFmt = formatTime(post.totalTime);
            const maxFmt = formatTime(maxTime);
            if (post.operations.length === 0) {
                rows.push({ "Пост": `Пост ${post.id}`, "Операция": "(нет операций)", "Время (сек)": 0, "Время (формат)": "0 сек", "Суммарно (сек)": post.totalTime, "Суммарно (формат)": totalFmt, "Лимит (сек)": maxTime, "Лимит (формат)": maxFmt, "Загрузка %": `${percent}%` });
            } else {
                post.operations.forEach(op => {
                    rows.push({ "Пост": `Пост ${post.id}`, "Операция": op.name, "Время (сек)": op.time, "Время (формат)": formatTime(op.time), "Суммарно (сек)": post.totalTime, "Суммарно (формат)": totalFmt, "Лимит (сек)": maxTime, "Лимит (формат)": maxFmt, "Загрузка %": `${percent}%` });
                });
            }
            rows.push({ "Пост": `--- ИТОГ ПОСТА ${post.id} ---`, "Операция": "", "Время (сек)": "", "Время (формат)": "", "Суммарно (сек)": post.totalTime, "Суммарно (формат)": totalFmt, "Лимит (сек)": maxTime, "Лимит (формат)": maxFmt, "Загрузка %": `${percent}%` });
        });
        const totalAll = posts.reduce((s,p) => s + p.totalTime, 0);
        rows.push({ "Пост": "📊 ОБЩАЯ СВОДКА", "Операция": "Сумма всех постов", "Время (сек)": totalAll, "Время (формат)": formatTime(totalAll), "Суммарно (сек)": "", "Суммарно (формат)": "", "Лимит (сек)": "", "Лимит (формат)": "", "Загрузка %": "" });
        const ws = XLSX.utils.json_to_sheet(rows);
        ws["!cols"] = [{wch:14},{wch:30},{wch:14},{wch:22},{wch:16},{wch:20},{wch:14},{wch:20},{wch:12}];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Yamazumi");
        const date = new Date();
        const fname = `Yamazumi_${date.getFullYear()}-${date.getMonth()+1}-${date.getDate()}.xlsx`;
        XLSX.writeFile(wb, fname);
    }
    
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function initPostSelect() {
        const select = document.getElementById("postSelect");
        select.innerHTML = "";
        for (let i=1; i<=POSTS_COUNT; i++) {
            let opt = document.createElement("option");
            opt.value = i;
            opt.textContent = `Пост ${i}`;
            select.appendChild(opt);
        }
    }
    
    document.getElementById("maxTime").addEventListener("input", () => { renderAll(); });
    window.addEventListener("load", () => {
        initPostSelect();
        loadFromLocalStorage();
        refreshAllTotals();
        renderAll();
    });
</script>
</body>
</html>
