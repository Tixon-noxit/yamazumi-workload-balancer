<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Yamazumi Board Lean Edition</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    margin: 0;
    padding: 24px;
    background: #1a1a1a;
    color: #f5f5f5;
}

h1 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    text-transform: uppercase;
    border-left: 8px solid #ffcc00;
    padding-left: 16px;
}

.toolbar {
    display: flex;
    gap: 12px;
}

button {
    border: none;
    cursor: pointer;
    background: #ffcc00;
    color: #000;
    font-weight: bold;
    padding: 10px 16px;
    transition: background 0.2s;
}

button:hover {
    background: #e6b800;
}

.layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
}

.panel {
    background: #262626;
    border: 4px solid #444;
    padding: 20px;
    margin-bottom: 24px;
}

.panel h2 {
    margin-top: 0;
    text-transform: uppercase;
}

.field {
    margin-bottom: 14px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #ccc;
}

input, select {
    width: 100%;
    padding: 10px;
    border: 2px solid #555;
    background: #111;
    color: white;
}

.posts-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
}

.post-card {
    background: #242424;
    border: 4px solid #555;
    padding: 16px;
    transition: .15s;
}

.post-card.drag-over {
    border-color: #ffcc00;
}

.post-title {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
    font-weight: bold;
}

.progress-wrapper {
    height: 34px;
    background: #111;
    border: 3px solid #666;
    position: relative;
    margin-bottom: 12px;
}

.progress-bar {
    height: 100%;
    transition: .2s;
}

.progress-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12px;
    font-weight: bold;
    text-shadow: 1px 1px 2px #000;
}

.operations {
    border-top: 2px dashed #444;
    padding-top: 10px;
    min-height: 80px;
}

.operation-item {
    background: #1e1e1e;
    border-left: 4px solid #ffcc00;
    padding: 8px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    cursor: grab;
}

.operation-item:active {
    cursor: grabbing;
}

.op-info {
    cursor: pointer;
    flex-grow: 1;
}

.op-info:hover {
    color: #ffcc00;
}

.op-buttons {
    display: flex;
    gap: 6px;
}

.op-buttons button {
    padding: 4px 8px;
    font-size: 11px;
    background: #333;
    color: #fff;
}

.op-buttons button:hover {
    background: #ffcc00;
    color: #000;
}

.chart-container {
    margin-top: 24px;
    background: #222;
    border: 4px solid #444;
    padding: 20px;
}

.chart-title {
    text-align: center;
    margin-bottom: 20px;
    font-weight: bold;
}

.bar-chart {
    position: relative;
    display: flex;
    align-items: flex-end;
    gap: 14px;
    height: 350px;
    border-left: 2px solid #777;
    border-bottom: 2px solid #777;
    padding: 10px;
    background: #111;
}

.bar-wrapper {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    position: relative;
    z-index: 10;
}

.bar {
    width: 100%;
    border-radius: 6px 6px 0 0;
    transition: .2s;
}

.bar-label {
    margin-top: 8px;
    font-size: 12px;
    text-align: center;
    color: #fff;
}

.chart-reference-line {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 2px dashed;
    z-index: 5;
    transition: bottom 0.2s;
}

.tt-line {
    border-color: #00d4ff;
}

.tct-line {
    border-color: #ff3b30;
}

.chart-line-label {
    position: absolute;
    right: 8px;
    top: -12px;
    background: #111;
    padding: 2px 6px;
    font-size: 11px;
    font-weight: bold;
    border-radius: 3px;
}

.tt-line .chart-line-label { color: #00d4ff; border: 1px solid #00d4ff; }
.tct-line .chart-line-label { color: #ff3b30; border: 1px solid #ff3b30; }

.insert-indicator {
    height: 4px;
    background: #ffcc00;
    border-radius: 2px;
    margin: 4px 0;
    box-shadow: 0 0 6px #ffcc00;
}

.metrics-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.metric-card {
    background: #1b1b1b;
    border: 2px solid #555;
    padding: 14px;
}

.metric-title {
    font-size: 12px;
    color: #bbb;
    margin-bottom: 6px;
}

.metric-value {
    font-size: 22px;
    font-weight: bold;
}

.warning {
    border-color: #ff3b30 !important;
}

#cancelEditBtn {
    background: #555;
    color: white;
    margin-top: 8px;
}
#cancelEditBtn:hover {
    background: #777;
}

/* ========= ОБНОВЛЕННЫЙ СТИЛЬ ДЛЯ ПЕЧАТИ (ТОЛЬКО ДИАГРАММА) ========= */
@media print {
    body * {
        visibility: hidden;
    }
    
    .chart-container, .chart-container * {
        visibility: visible;
    }

    body {
        background: white !important;
        color: black !important;
        margin: 0;
        padding: 0;
    }

    .chart-container {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        background: transparent !important;
        border: none !important;
        padding: 0;
        margin: 0;
    }

    .bar-chart {
        background: #f5f5f5 !important;
        border-left: 2px solid #000 !important;
        border-bottom: 2px solid #000 !important;
    }

    .bar-label {
        color: #000 !important;
    }

    .chart-title {
        color: #000 !important;
        font-size: 20px;
    }

    .print-summary {
        display: none !important;
    }
}
</style>
</head>

<body>

<h1>
    YAMAZUMI BOARD LEAN EDITION
    <div class="toolbar">
        <button onclick="exportToExcel()">EXCEL</button>
        <button onclick="printReport()">ПЕЧАТЬ</button>
        <button onclick="resetAllData()">СБРОС</button>
    </div>
</h1>

<div class="layout">
    <div>
        <div class="panel">
            <h2 id="formTitle">Операции</h2>

            <div class="field">
                <label>Название операции</label>
                <input type="text" id="operationName">
            </div>

            <div class="field">
                <label>Время операции (сек)</label>
                <input type="number" id="operationTime">
            </div>

            <div class="field">
                <label>Пост</label>
                <select id="postSelect"></select>
            </div>

            <div class="field">
                <label>Лимит поста (сек)</label>
                <input type="number" id="maxTime" value="28800">
            </div>

            <button id="submitOpBtn" onclick="handleSubmitOperation()">ДОБАВИТЬ</button>
            <button id="cancelEditBtn" onclick="cancelEditing()" style="display:none;">ОТМЕНА</button>
        </div>

        <div class="panel">
            <h2>Lean Metrics</h2>
            <div class="field">
                <label>Производственное время (мин)</label>
                <input type="number" id="productionTime" value="450">
            </div>
            <div class="field">
                <label>Ежедневные заказы</label>
                <input type="number" id="dailyOrders" value="24">
            </div>
            <div class="field">
                <label>OPR (%) коэффициент эффективности производства</label>
                <input type="number" id="opr" value="95">
            </div>
        </div>
    </div>

    <div>
        <div class="posts-grid" id="postsGrid"></div>

        <div class="chart-container">
            <div class="chart-title">Yamazumi Chart</div>
            <div class="bar-chart" id="barChart"></div>
        </div>

        <div class="panel">
            <h2>Lean KPI</h2>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-title">TT (Время такта)</div>
                    <div class="metric-value" id="ttValue"></div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">TCT (Целевое время цикла)</div>
                    <div class="metric-value" id="tctValue"></div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">WACT (Средневзвешенное время цикла)</div>
                    <div class="metric-value" id="wactValue"></div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">HCI (Идеальное количество процессов)</div>
                    <div class="metric-value" id="hciValue"></div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">Операторы</div>
                    <div class="metric-value" id="hcReal"></div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">LBE (Баланс эффективности)</div>
                    <div class="metric-value" id="lbeValue"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const POSTS_COUNT = 10;
let posts = [];

let dragSource = null;
let activeInsertPostId = null;
let activeInsertIndex = -1;

let editMode = false;
let editingPostId = null;
let editingOpIndex = null;

function saveToLocalStorage() {
    localStorage.setItem("yamazumi_posts", JSON.stringify(posts));
    localStorage.setItem("yamazumi_maxTime", document.getElementById("maxTime").value);
    localStorage.setItem("yamazumi_productionTime", document.getElementById("productionTime").value);
    localStorage.setItem("yamazumi_dailyOrders", document.getElementById("dailyOrders").value);
    localStorage.setItem("yamazumi_opr", document.getElementById("opr").value);
}

function loadFromLocalStorage() {
    const savedPosts = localStorage.getItem("yamazumi_posts");
    if (savedPosts) {
        posts = JSON.parse(savedPosts);
    } else {
        initPosts();
    }

    if (localStorage.getItem("yamazumi_maxTime") !== null) {
        document.getElementById("maxTime").value = localStorage.getItem("yamazumi_maxTime");
    }
    if (localStorage.getItem("yamazumi_productionTime") !== null) {
        document.getElementById("productionTime").value = localStorage.getItem("yamazumi_productionTime");
    }
    if (localStorage.getItem("yamazumi_dailyOrders") !== null) {
        document.getElementById("dailyOrders").value = localStorage.getItem("yamazumi_dailyOrders");
    }
    if (localStorage.getItem("yamazumi_opr") !== null) {
        document.getElementById("opr").value = localStorage.getItem("yamazumi_opr");
    }
}

function initPosts(){
    posts = [];
    for(let i = 1; i <= POSTS_COUNT; i++){
        posts.push({
            id: i,
            operations: [],
            totalTime: 0
        });
    }
}

function initSelect(){
    const select = document.getElementById("postSelect");
    select.innerHTML = "";
    for(let i = 1; i <= POSTS_COUNT; i++){
        const opt = document.createElement("option");
        opt.value = i;
        opt.textContent = `Пост ${i}`;
        select.appendChild(opt);
    }
}

function handleSubmitOperation() {
    const name = document.getElementById("operationName").value.trim();
    const time = Number(document.getElementById("operationTime").value);
    const postId = Number(document.getElementById("postSelect").value);

    if(!name || !time) return;

    if (editMode) {
        const oldPost = posts.find(p => p.id === editingPostId);
        if(oldPost && oldPost.operations[editingOpIndex]) {
            const [movedOp] = oldPost.operations.splice(editingOpIndex, 1);
            movedOp.name = name;
            movedOp.time = time;
            
            const targetPost = posts.find(p => p.id === postId);
            targetPost.operations.push(movedOp);
        }
        cancelEditing();
    } else {
        const post = posts.find(p => p.id === postId);
        post.operations.push({ name, time });
    }

    recalcTotals();
    renderAll();
}

function startEditOperation(postId, index) {
    const post = posts.find(p => p.id === postId);
    const op = post.operations[index];
    if(!op) return;

    editMode = true;
    editingPostId = postId;
    editingOpIndex = index;

    document.getElementById("formTitle").innerText = "Редактировать операцию";
    document.getElementById("operationName").value = op.name;
    document.getElementById("operationTime").value = op.time;
    document.getElementById("postSelect").value = postId;
    document.getElementById("submitOpBtn").innerText = "СОХРАНИТЬ";
    document.getElementById("cancelEditBtn").style.display = "inline-block";
    
    document.getElementById("operationName").focus();
}

function cancelEditing() {
    editMode = false;
    editingPostId = null;
    editingOpIndex = null;

    document.getElementById("formTitle").innerText = "Операции";
    document.getElementById("operationName").value = "";
    document.getElementById("operationTime").value = "";
    document.getElementById("submitOpBtn").innerText = "ДОБАВИТЬ";
    document.getElementById("cancelEditBtn").style.display = "none";
}

function removeOperation(postId, index, event){
    if(event) event.stopPropagation();
    
    const post = posts.find(p => p.id === postId);
    post.operations.splice(index, 1);

    if(editMode && editingPostId === postId && editingOpIndex === index) {
        cancelEditing();
    }

    recalcTotals();
    renderAll();
}

function recalcTotals(){
    posts.forEach(post => {
        post.totalTime = post.operations.reduce((s, o) => s + o.time, 0);
    });
}

function formatTime(seconds){
    const min = Math.floor(seconds / 60);
    const sec = seconds % 60;
    return `${min}м ${sec}с`;
}

function getBarColor(percent){
    if(percent < 90) return "#27c93f";
    if(percent < 100) return "#ffcc00";
    return "#ff3b30";
}

function getTT(){
    const productionTime = Number(document.getElementById("productionTime").value);
    const dailyOrders = Number(document.getElementById("dailyOrders").value);
    if(!dailyOrders) return 0;
    return (productionTime * 60) / dailyOrders;
}

function getTCT(){
    const TT = getTT();
    const opr = Number(document.getElementById("opr").value);
    return TT * (opr / 100);
}

function moveOperationTo(sourcePostId, sourceOpIndex, targetPostId, targetInsertIndex){
    const sourcePost = posts.find(p => p.id === sourcePostId);
    const targetPost = posts.find(p => p.id === targetPostId);
    if (!sourcePost || !targetPost) return;

    const [movedOperation] = sourcePost.operations.splice(sourceOpIndex, 1);

    if(sourcePostId === targetPostId && sourceOpIndex < targetInsertIndex){
        targetInsertIndex--;
    }

    if (targetInsertIndex < 0 || targetInsertIndex > targetPost.operations.length) {
        targetPost.operations.push(movedOperation);
    } else {
        targetPost.operations.splice(targetInsertIndex, 0, movedOperation);
    }
    recalcTotals();
}

function clearInsertIndicators() {
    document.querySelectorAll(".insert-indicator").forEach(el => el.remove());
    document.querySelectorAll(".post-card").forEach(el => el.classList.remove("drag-over"));
}

function renderPosts(){
    const grid = document.getElementById("postsGrid");
    grid.innerHTML = "";

    const maxTime = Number(document.getElementById("maxTime").value);
    const TCT = getTCT();

    posts.forEach(post => {
        const percent = maxTime ? Math.round((post.totalTime / maxTime) * 100) : 0;
        const overloaded = post.totalTime > TCT;

        const card = document.createElement("div");
        card.className = "post-card";
        card.dataset.postId = post.id;
        if(overloaded) { card.classList.add("warning"); }

        card.innerHTML = `
            <div class="post-title">
                <span>ПОСТ ${post.id}</span>
                <span>${formatTime(post.totalTime)}</span>
            </div>
            <div class="progress-wrapper">
                <div class="progress-bar" style="width:${Math.min(percent, 100)}%; background:${getBarColor(percent)};"></div>
                <div class="progress-text">${percent}%</div>
            </div>
            <div class="operations" id="ops-list-${post.id}">
                ${post.operations.map((op, index) => `
                    <div class="operation-item" draggable="true" data-post-id="${post.id}" data-op-index="${index}">
                        <div class="op-info" onclick="startEditOperation(${post.id}, ${index})">
                            <strong>${escapeHtml(op.name)}</strong><br>
                            <small>${op.time} сек</small>
                        </div>
                        <div class="op-buttons">
                            <button onclick="startEditOperation(${post.id}, ${index})">✏️</button>
                            <button onclick="removeOperation(${post.id}, ${index}, event)">🗑</button>
                        </div>
                    </div>
                `).join("")}
            </div>
        `;

        grid.appendChild(card);

        // Навешиваем Drag & Drop события на саму КАРТОЧКУ поста (чтобы можно было бросать в пустые посты)
        card.addEventListener("dragover", (e) => {
            e.preventDefault();
            card.classList.add("drag-over");
            
            // Если мы зависли над пустой зоной карточки, сбрасываем в конец списка этого поста
            if (e.target.classList.contains("operations") || e.target.closest(".post-card") === card) {
                const container = document.getElementById(`ops-list-${post.id}`);
                if (container && !container.querySelector(".insert-indicator")) {
                    clearInsertIndicators();
                    card.classList.add("drag-over");
                    activeInsertPostId = post.id;
                    activeInsertIndex = post.operations.length;
                    
                    const indicator = document.createElement("div");
                    indicator.className = "insert-indicator";
                    container.appendChild(indicator);
                }
            }
        });

        card.addEventListener("dragleave", (e) => {
            const related = e.relatedTarget;
            if (!card.contains(related)) {
                card.classList.remove("drag-over");
            }
        });

        card.addEventListener("drop", (e) => {
            e.preventDefault();
            if(!dragSource) return;

            if(editMode && dragSource.postId === editingPostId && dragSource.opIndex === editingOpIndex) {
                cancelEditing();
            }

            moveOperationTo(
                dragSource.postId,
                dragSource.opIndex,
                activeInsertPostId,
                activeInsertIndex
            );
            renderAll();
        });

        // Навешиваем события на сами ЭЛЕМЕНТЫ операций внутри карточки
        const operations = card.querySelectorAll(".operation-item");
        operations.forEach(el => {
            el.addEventListener("dragstart", (e) => {
                dragSource = {
                    postId: Number(el.dataset.postId),
                    opIndex: Number(el.dataset.opIndex)
                };
                el.style.opacity = ".5";
                e.dataTransfer.setData("text/plain", ""); // Фикс для корректного Drag в некоторых браузерах
            });

            el.addEventListener("dragend", () => {
                dragSource = null;
                el.style.opacity = "";
                clearInsertIndicators();
            });

            el.addEventListener("dragover", (e) => {
                e.preventDefault();
                e.stopPropagation();

                const rect = el.getBoundingClientRect();
                const middle = rect.top + rect.height / 2;
                const mouseY = e.clientY;
                const targetPostId = Number(el.dataset.postId);
                const targetIndex = Number(el.dataset.opIndex);

                let insertIndex = mouseY > middle ? targetIndex + 1 : targetIndex;

                clearInsertIndicators();
                card.classList.add("drag-over");

                activeInsertPostId = targetPostId;
                activeInsertIndex = insertIndex;

                const indicator = document.createElement("div");
                indicator.className = "insert-indicator";

                const container = document.getElementById(`ops-list-${targetPostId}`);
                const children = container.querySelectorAll(".operation-item");

                if(insertIndex >= children.length){
                    container.appendChild(indicator);
                } else {
                    container.insertBefore(indicator, children[insertIndex]);
                }
            });
        });
    });
}

function renderBarChart(){
    const chart = document.getElementById("barChart");
    chart.innerHTML = "";

    const maxTime = Number(document.getElementById("maxTime").value) || 1;
    const TT = getTT();
    const TCT = getTCT();

    const highestTimeValue = Math.max(maxTime, TT, TCT, ...posts.map(p => p.totalTime));

    posts.forEach(post => {
        const percentOfLimit = maxTime ? (post.totalTime / maxTime) * 100 : 0;
        const currentHeightPercent = (post.totalTime / highestTimeValue) * 100;

        const wrapper = document.createElement("div");
        wrapper.className = "bar-wrapper";
        wrapper.innerHTML = `
            <div class="bar" style="height:${Math.max(currentHeightPercent, 2)}%; background:${getBarColor(percentOfLimit)};"></div>
            <div class="bar-label">
                П${post.id}<br>
                ${post.totalTime}с
            </div>
        `;
        chart.appendChild(wrapper);
    });

    renderReferenceLines(highestTimeValue);
}

function renderReferenceLines(highestTimeValue){
    const chart = document.getElementById("barChart");
    const TT = getTT();
    const TCT = getTCT();

    if(highestTimeValue <= 0) return;

    const ttPercent = (TT / highestTimeValue) * 100;
    const tctPercent = (TCT / highestTimeValue) * 100;

    const ttLine = document.createElement("div");
    ttLine.className = "chart-reference-line tt-line";
    ttLine.style.bottom = `${ttPercent}%`;
    ttLine.innerHTML = `<span class="chart-line-label">TT: ${Math.round(TT)}с</span>`;
    chart.appendChild(ttLine);

    const tctLine = document.createElement("div");
    tctLine.className = "chart-reference-line tct-line";
    tctLine.style.bottom = `${tctPercent}%`;
    tctLine.innerHTML = `<span class="chart-line-label">TCT: ${Math.round(TCT)}с</span>`;
    chart.appendChild(tctLine);
}

function renderLeanMetrics(){
    const TT_sec = getTT();
    const TCT_sec = getTCT();

    const TT_min = TT_sec / 60;
    const TCT_min = TCT_sec / 60;

    const totalWact_min = posts.reduce((s, p) => s + (p.totalTime / 60), 0);
    const HCI = TCT_min > 0 ? (totalWact_min / TCT_min) : 0;
    const HCReal = Math.ceil(HCI) || 1;
    const LBE = (HCI / HCReal) * 100;

    document.getElementById("ttValue").innerText = `${TT_min.toFixed(2)} мин`;
    document.getElementById("tctValue").innerText = `${TCT_min.toFixed(2)} мин`;
    document.getElementById("wactValue").innerText = `${totalWact_min.toFixed(2)} мин`;
    document.getElementById("hciValue").innerText = HCI.toFixed(2);
    document.getElementById("hcReal").innerText = HCReal;
    document.getElementById("lbeValue").innerText = `${LBE.toFixed(0)}%`;
}

function exportToExcel(){
    const rows = [];
    posts.forEach(post => {
        post.operations.forEach(op => {
            rows.push({
                "Пост": post.id,
                "Операция": op.name,
                "Время сек": op.time
            });
        });
    });

    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Yamazumi");
    XLSX.writeFile(wb, "yamazumi.xlsx");
}

function resetAllData(){
    if(!confirm("Удалить все операции?")) return;
    cancelEditing();
    initPosts();
    localStorage.clear();
    renderAll();
}

function renderAll(){
    renderPosts();
    renderBarChart();
    renderLeanMetrics();
    saveToLocalStorage();
}

document.getElementById("productionTime").addEventListener("input", renderAll);
document.getElementById("dailyOrders").addEventListener("input", renderAll);
document.getElementById("opr").addEventListener("input", renderAll);
document.getElementById("maxTime").addEventListener("input", renderAll);

function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m));
}

// ПРАВИЛЬНЫЙ ПОРЯДОК ИНИЦИАЛИЗАЦИИ
initSelect();
loadFromLocalStorage();
renderAll();

function getMaxTime() {
    let val = Number(document.getElementById("maxTime").value);
    return (isNaN(val) || val <= 0) ? 28800 : val;
}

function printReport() {
    const originalTitle = document.title;
    document.title = "Yamazumi Board Chart";
    window.print();
    document.title = originalTitle;
}
